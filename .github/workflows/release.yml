name: Release

on:
  push:
    tags:
      - "v*"

env:
  RELEASE_REPO: striker561/Mercury

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      is_stable: ${{ steps.check.outputs.is_stable }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Validate stable release tag
        id: check
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: ubuntu-24.04
    needs: validate-tag
    if: needs.validate-tag.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/bun.lock', 'frontend/bun.lockb', 'frontend/package.json') }}

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Generate bindings
        run: wails3 generate bindings -ts -i -clean=true
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test $(go list ./... | grep -v '/clipboard$')
      - name: Frontend typecheck
        run: bun install && bun run build
        working-directory: frontend

      - name: Upload frontend build for reuse
        run: |
          cd frontend
          tar czf ../frontend-build.tar.gz node_modules dist bindings
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-build.tar.gz
          retention-days: 1

  build-linux:
    runs-on: ubuntu-24.04
    needs: [validate-tag, test]
    if: needs.validate-tag.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev libayatana-appindicator3-dev

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/bun.lock', 'frontend/bun.lockb', 'frontend/package.json') }}

      - name: Download prebuilt frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
      - name: Extract frontend
        run: tar xzf frontend-build.tar.gz -C frontend

      - name: Install Wails v3 and nfpm
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Generate bindings
        run: wails3 generate bindings -ts -i -clean=true

      - name: Inject version into nfpm
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          sed -i "s/^version: .*/version: \"${VERSION}\"/" build/linux/nfpm/nfpm.yaml

      - name: Build .deb package
        run: wails3 task linux:create:deb VERSION=v${{ needs.validate-tag.outputs.version }}

      - name: Prepare Linux release artifacts
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          cp bin/mercury.deb bin/mercury_linux_amd64.deb
          cp bin/mercury bin/mercury_linux_amd64
          chmod +x bin/mercury_linux_amd64

      - uses: actions/upload-artifact@v4
        with:
          name: mercury-linux-amd64
          path: |
            bin/mercury_linux_amd64.deb
            bin/mercury_linux_amd64

  build-macos:
    runs-on: macos-latest
    needs: [validate-tag, test]
    if: needs.validate-tag.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/bun.lock', 'frontend/bun.lockb', 'frontend/package.json') }}

      - name: Download prebuilt frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
      - name: Extract frontend
        run: tar xzf frontend-build.tar.gz -C frontend

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Inject version into Info.plist
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" build/darwin/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" build/darwin/Info.plist

      - name: Package into .app bundle
        run: wails3 task darwin:package:universal VERSION=v${{ needs.validate-tag.outputs.version }}

      - name: Create DMG (manual install)
        run: |
          hdiutil create \
            -volname "Mercury" \
            -srcfolder "bin/mercury.app" \
            -ov -format UDZO \
            mercury-macos-universal.dmg

      - name: Create updater zip (.app bundle)
        run: |
          ditto -c -k --sequesterRsrc --keepParent bin/mercury.app mercury_darwin_universal.zip

      - uses: actions/upload-artifact@v4
        with:
          name: mercury-macos-universal
          path: |
            mercury-macos-universal.dmg
            mercury_darwin_universal.zip

  build-windows:
    runs-on: windows-latest
    needs: [validate-tag, test]
    if: needs.validate-tag.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download prebuilt frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
      - name: Extract frontend
        run: tar xzf frontend-build.tar.gz -C frontend

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Add NSIS to PATH
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ChocolateyInstall\bin",
            "${env:ProgramFiles(x86)}\NSIS",
            "$env:ProgramFiles\NSIS"
          )
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              Add-Content -Path $env:GITHUB_PATH -Value $candidate
              $env:PATH = "$candidate;$env:PATH"
            }
          }
          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if (-not $makensis) {
            throw "makensis not found after NSIS installation"
          }
          Write-Host "Using makensis at $($makensis.Source)"

      - name: Generate bindings
        run: wails3 generate bindings -ts -i -clean=true

      - name: Inject version into Windows metadata
        shell: bash
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          sed -i "s/\"ProductVersion\": \"[^\"]*\"/\"ProductVersion\": \"${VERSION}\"/" build/windows/info.json
          sed -i "s/\"file_version\": \"[^\"]*\"/\"file_version\": \"${VERSION}\"/" build/windows/info.json
          sed -i "/assemblyIdentity/s/version=\"[^\"]*\"/version=\"${VERSION}\"/" build/windows/wails.exe.manifest

      - name: Build NSIS installer
        run: wails3 task windows:package VERSION=v${{ needs.validate-tag.outputs.version }}

      - name: Prepare Windows artifacts
        shell: bash
        run: |
          cp bin/mercury.exe mercury_windows_amd64.exe
          cp bin/mercury-amd64-installer.exe mercury-amd64-installer.exe

      - uses: actions/upload-artifact@v4
        with:
          name: mercury-windows-amd64
          path: |
            mercury-amd64-installer.exe
            mercury_windows_amd64.exe

  release:
    runs-on: ubuntu-latest
    needs: [validate-tag, build-linux, build-macos, build-windows]
    if: needs.validate-tag.outputs.is_stable == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG..$GITHUB_REF_NAME" --no-merges --pretty=format:"* %s (%h)" > CHANGELOG.md
          else
            git log --no-merges --pretty=format:"* %s (%h)" > CHANGELOG.md
          fi
          {
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | Install manually | Auto-update asset |"
            echo "| --- | --- | --- |"
            echo "| macOS | \`mercury-macos-universal.dmg\` | \`mercury_darwin_universal.zip\` |"
            echo "| Linux | \`mercury_linux_amd64.deb\` | \`mercury_linux_amd64\` |"
            echo "| Windows | \`mercury-amd64-installer.exe\` | \`mercury_windows_amd64.exe\` |"
            echo ""
            echo "Checksums: \`SHA256SUMS\`. In-app updates use the auto-update assets via the Wails v3 updater (tray → Check for Updates…)."
          } >> CHANGELOG.md
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum \
            mercury-macos-universal.dmg \
            mercury_darwin_universal.zip \
            mercury_linux_amd64 \
            mercury_linux_amd64.deb \
            mercury-amd64-installer.exe \
            mercury_windows_amd64.exe \
            > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/mercury-macos-universal.dmg
            artifacts/mercury_darwin_universal.zip
            artifacts/mercury_linux_amd64
            artifacts/mercury_linux_amd64.deb
            artifacts/mercury-amd64-installer.exe
            artifacts/mercury_windows_amd64.exe
            artifacts/SHA256SUMS
