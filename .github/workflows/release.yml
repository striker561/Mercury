name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      is_stable: ${{ steps.check.outputs.is_stable }}
    steps:
      - name: Validate stable release tag
        id: check
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: ubuntu-24.04
    needs: validate-tag
    if: needs.validate-tag.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Generate bindings
        run: wails3 generate bindings -ts -i -clean=true
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test $(go list ./... | grep -v '/clipboard$')
      - name: Frontend typecheck
        run: bun install && bun run build
        working-directory: frontend

  build-linux:
    runs-on: ubuntu-24.04
    needs: [validate-tag, test]
    if: needs.validate-tag.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Generate bindings
        run: wails3 generate bindings -ts -i -clean=true
      - name: Build frontend
        run: bun install && bun run build
        working-directory: frontend
      - name: Build binary
        run: go build -ldflags="-s -w -X mercury/app.Version=${{ github.ref_name }}" -o mercury-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: mercury-linux-amd64
          path: mercury-linux-amd64

  build-macos:
    runs-on: macos-latest
    needs: [validate-tag, test]
    if: needs.validate-tag.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Generate bindings
        run: wails3 generate bindings -ts -i -clean=true
      - name: Build frontend
        run: bun install && bun run build
        working-directory: frontend
      - name: Build for ARM64
        run: go build -ldflags="-s -w -X mercury/app.Version=${{ github.ref_name }}" -o mercury-macos-arm64 .
      - name: Build for AMD64
        run: GOARCH=amd64 go build -ldflags="-s -w -X mercury/app.Version=${{ github.ref_name }}" -o mercury-macos-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: mercury-macos
          path: mercury-macos-*

  build-windows:
    runs-on: windows-latest
    needs: [validate-tag, test]
    if: needs.validate-tag.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Generate bindings
        run: wails3 generate bindings -ts -i -clean=true
      - name: Build frontend
        run: bun install && bun run build
        working-directory: frontend
      - name: Build
        run: go build -ldflags="-s -w -X mercury/app.Version=${{ github.ref_name }}" -o mercury-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: mercury-windows-amd64
          path: mercury-windows-amd64.exe

  release:
    runs-on: ubuntu-latest
    needs: [validate-tag, build-linux, build-macos, build-windows]
    if: needs.validate-tag.outputs.is_stable == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG..$GITHUB_REF_NAME" --no-merges --pretty=format:"* %s (%h)" > CHANGELOG.md
          else
            git log --no-merges --pretty=format:"* %s (%h)" > CHANGELOG.md
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: cd artifacts && sha256sum mercury-* > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: artifacts/*
