name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Create webkit2gtk-4.0 compat shim
        run: |
          sudo mkdir -p /usr/local/lib/pkgconfig
          printf 'Name: webkit2gtk-4.0\nDescription: compat\nVersion: 2.44\nRequires: webkit2gtk-4.1\nCflags:\nLibs:\n' \
            | sudo tee /usr/local/lib/pkgconfig/webkit2gtk-4.0.pc
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Generate bindings
        run: wails3 generate bindings -ts -i -clean=true

      - name: Install frontend deps
        run: bun install
        working-directory: frontend

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test $(go list ./... | grep -v '/clipboard$')

      - name: Go build
        run: go build ./...

      - name: Frontend typecheck
        run: bun run build
        working-directory: frontend
