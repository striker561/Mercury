# This file contains the configuration for this project.
version: "3"

info:
  companyName: "Mercury"
  productName: "Mercury"
  productIdentifier: "com.mercury.app"
  description: "LAN Clipboard & File Sharing"
  copyright: "(c) 2026, Mercury"
  comments: "Cross-platform LAN clipboard and file sharing tray app"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: cd frontend && bun install
      type: once
    - cmd: wails3 generate bindings -ts -i
      type: blocking
    - cmd: cd frontend && WAILS_VITE_PORT=9245 bun run dev
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: go build -o bin/mercury .
      type: blocking
    - cmd: ./bin/mercury
      type: primary
